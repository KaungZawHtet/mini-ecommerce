services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mini_ecommerce
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mini_ecommerce"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mini_ecommerce?schema=public
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && npm run db:seed && npm run start:dev"
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      BACKEND_INTERNAL_URL: http://backend:3001
    ports:
      - "3000:3000"
    depends_on:
      - backend
    command: npm run dev -- --hostname 0.0.0.0
    volumes:
      - ./frontend/src:/app/src

volumes:
  postgres_data:
